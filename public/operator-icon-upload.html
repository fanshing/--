<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>干员图标批量上传（写入项目）</title>
  <style>
    :root{--bg:#0f1113;--panel:#141518;--muted:#9aa0a6;--accent:#e6e6e6;--line:rgba(255,255,255,.08);--ok:#c9f5c9;--warn:#ffd29c;--bad:#ff9c9c}
    html,body{height:100%;margin:0}
    body{font-family:Inter, Arial, sans-serif;background:var(--bg);color:var(--accent);padding:18px}
    h1{margin:6px 0 8px;font-size:22px}
    p{color:var(--muted);margin:6px 0;line-height:1.4}
    code{background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px}

    .top{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0 10px}
    button{background:#1c1f23;border:1px solid rgba(255,255,255,.08);color:var(--accent);padding:8px 10px;border-radius:8px;cursor:pointer}
    button:disabled{opacity:.5;cursor:not-allowed}
    .pill{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.10);color:var(--muted)}

    .drop{border:1px dashed rgba(255,255,255,.18);border-radius:12px;padding:18px;min-height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;cursor:pointer;user-select:none}
    .drop.drag{border-color:#fff;color:#fff}

    table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
    th,td{border-bottom:1px solid rgba(255,255,255,.08);padding:8px 6px;text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:600}
    .ok{color:var(--ok)}
    .warn{color:var(--warn)}
    .bad{color:var(--bad)}
  </style>
</head>
<body>
  <h1>干员图标批量上传（自动写入 public/icons/operators）</h1>
  <p>把图片文件（PNG/WEBP/SVG）拖进下面区域即可批量上传。<b>要求：文件名（不含扩展名）等于干员名</b>，例如 <code>能天使.png</code>。</p>
  <p>上传接口：<code>/api/icons/operator</code>。上传后回到游戏页面刷新即可生效；如果不生效，试试 Ctrl+F5。</p>

  <div class="top">
    <button id="btn-status">查看当前已存在数量</button>
    <span class="pill" id="status-pill">未检查</span>
    <span class="pill">提示：此工具不会从网络抓取图片</span>
  </div>

  <input id="file" type="file" accept="image/*" multiple style="display:none" />
  <div id="drop" class="drop">拖拽/点击选择多张图片（文件名=干员名）</div>

  <table>
    <thead>
      <tr>
        <th style="width:220px">文件</th>
        <th style="width:160px">解析到的干员名</th>
        <th>结果</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const tbody = document.getElementById('tbody');
    const pill = document.getElementById('status-pill');

    function cleanKey(s) { return String(s || '').replace(/\s/g, ''); }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ''));
        r.onerror = () => reject(new Error('读取文件失败'));
        r.readAsDataURL(file);
      });
    }

    function baseName(filename) {
      const s = String(filename || '');
      const idx = s.lastIndexOf('.');
      if (idx <= 0) return s;
      return s.slice(0, idx);
    }

    async function uploadOperatorIcon(name, dataUrl) {
      const res = await fetch('/api/icons/operator', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, dataUrl })
      });
      const json = await res.json().catch(() => null);
      if (!res.ok || !json || json.ok !== true) {
        const msg = (json && (json.error || json.detail)) ? (json.error || json.detail) : ('HTTP ' + res.status);
        throw new Error(msg);
      }
      return json;
    }

    function addRow(file, name) {
      const tr = document.createElement('tr');
      const tdFile = document.createElement('td');
      const tdName = document.createElement('td');
      const tdRes = document.createElement('td');
      tdFile.textContent = file && file.name ? file.name : '';
      tdName.textContent = name;
      tdRes.textContent = '等待上传…';
      tr.appendChild(tdFile);
      tr.appendChild(tdName);
      tr.appendChild(tdRes);
      tbody.appendChild(tr);
      return tdRes;
    }

    async function loadOperatorNameSet() {
      try {
        const res = await fetch('/operators.json', { cache: 'no-store' });
        const list = await res.json();
        const set = new Set();
        (Array.isArray(list) ? list : []).forEach(op => {
          if (!op || typeof op !== 'object' || !op.name) return;
          set.add(cleanKey(op.name));
        });
        return set;
      } catch (_) {
        return null;
      }
    }

    async function handleFiles(files) {
      const arr = Array.from(files || []).filter(Boolean);
      if (!arr.length) return;

      const nameSet = await loadOperatorNameSet();

      for (const f of arr) {
        const name = baseName(f.name).trim();
        const tdRes = addRow(f, name);

        if (!name) {
          tdRes.textContent = '失败：无法从文件名解析干员名';
          tdRes.className = 'bad';
          continue;
        }

        if (nameSet && !nameSet.has(cleanKey(name))) {
          tdRes.textContent = '警告：该名字不在 operators.json 中，但仍会尝试上传';
          tdRes.className = 'warn';
        }

        try {
          const dataUrl = await fileToDataUrl(f);
          const out = await uploadOperatorIcon(name, dataUrl);
          tdRes.textContent = '成功：' + out.path;
          tdRes.className = 'ok';
        } catch (e) {
          tdRes.textContent = '失败：' + (e && e.message ? e.message : '未知错误');
          tdRes.className = 'bad';
        }
      }
    }

    async function refreshStatus() {
      try {
        pill.textContent = '检查中…';
        const res = await fetch('/api/icons/operators/status', { cache: 'no-store' });
        const json = await res.json();
        if (!json || json.ok !== true) throw new Error((json && json.error) || '未知错误');
        pill.textContent = `已存在：${json.count || 0} 个`;
      } catch (e) {
        pill.textContent = '检查失败：' + (e && e.message ? e.message : '未知错误');
      }
    }

    drop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    drop.addEventListener('dragover', (e) => {
      e.preventDefault();
      drop.classList.add('drag');
    });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
    drop.addEventListener('drop', (e) => {
      e.preventDefault();
      drop.classList.remove('drag');
      const files = e.dataTransfer && e.dataTransfer.files;
      handleFiles(files);
    });

    document.getElementById('btn-status').addEventListener('click', refreshStatus);
    refreshStatus();
  </script>
</body>
</html>
