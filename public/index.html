
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>连锁博弈</title>
  <style>
    :root{
      --bg:#080c12;--bg-alt:#0c1017;--panel:#0f131a;--panel-hi:#141820;
      --muted:#5e6778;--muted-light:#798293;--accent:#ecf0f5;
      --gold:#f5b82e;--gold-dim:#b8891f;--cyan:#2ecfeb;--cyan-dim:#1e8fa3;
      --blue:#3d8eff;--blue-dim:#2563c0;--red:#f04a4a;--red-dim:#b83535;
      --border:rgba(200,210,230,0.08);--border-focus:rgba(200,210,230,0.15);--border-high:rgba(120,160,220,0.18)
    }
    html,body{height:100%;margin:0;overflow:hidden}
    body{
      font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei','Helvetica Neue',Inter,Arial,sans-serif;
      background:var(--bg);color:var(--accent);display:flex;flex-direction:column;align-items:center;padding:12px;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.018;
      background-image:
        repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(61,142,255,.5) 2px,rgba(61,142,255,.5) 3px),
        repeating-linear-gradient(-45deg,transparent,transparent 2px,rgba(61,142,255,.5) 2px,rgba(61,142,255,.5) 3px)
    }
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(61,142,255,.2);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(61,142,255,.35)}
    h1{color:var(--accent);text-align:center;margin:8px 0 12px;font-size:28px}

    /* lobby styles */
    .lobby-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:20px}
    .avatar-section{display:flex;flex-direction:column;align-items:center;gap:12px}
    .avatar-preview{width:100px;height:100px;border-radius:50%;overflow:hidden;background:linear-gradient(180deg,var(--panel-hi),var(--panel));border:2px solid var(--border-high);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .3s ease,box-shadow .3s ease}
    .avatar-preview:hover{border-color:var(--blue);box-shadow:0 0 20px rgba(61,142,255,.2)}
    .avatar-preview img{width:100%;height:100%;object-fit:cover}
    .avatar-placeholder{color:var(--muted);font-size:14px}
    .avatar-actions{display:flex;gap:8px}
    .avatar-actions button{padding:6px 12px;font-size:13px;background:linear-gradient(180deg,var(--panel-hi),var(--panel));border:1px solid var(--border-high);color:var(--accent);border-radius:2px;cursor:pointer;transition:background .2s ease,border-color .2s ease;letter-spacing:.3px}
    .avatar-actions button:hover{background:linear-gradient(180deg,rgba(61,142,255,.15),rgba(61,142,255,.05));border-color:var(--blue)}
    .lobby-form{text-align:center}
    .lobby-form input,.lobby-form select{background:var(--bg-alt);border:1px solid var(--border-high);border-radius:2px;color:var(--accent);padding:6px 10px;font-size:14px;outline:none;transition:border-color .2s ease}
    .lobby-form input:focus,.lobby-form select:focus{border-color:var(--blue)}
    .lobby-form label{color:var(--muted);font-size:14px}
    #create-match,#join-player,#join-spectator{padding:8px 20px;font-size:14px;font-weight:600;letter-spacing:.5px;background:linear-gradient(180deg,rgba(61,142,255,.12) 0%,rgba(61,142,255,.04) 100%);border:1px solid var(--border-high);color:var(--accent);border-radius:2px;cursor:pointer;transition:background .2s ease,border-color .2s ease,box-shadow .2s ease}
    #create-match:hover:not(:disabled),#join-player:hover:not(:disabled),#join-spectator:hover:not(:disabled){background:linear-gradient(180deg,rgba(61,142,255,.2) 0%,rgba(61,142,255,.08) 100%);border-color:rgba(120,160,220,.35);box-shadow:0 0 12px rgba(61,142,255,.15)}
    #create-match:disabled,#join-player:disabled,#join-spectator:disabled{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);color:rgba(255,255,255,.25);cursor:not-allowed}
    #status{color:var(--muted-light);font-size:14px}

    /* layout */
    section{width:100%;max-width:1200px}
    .top-row{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
    .pool-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
    .pool-title{font-size:13px;color:var(--muted);letter-spacing:1.5px;text-align:center}
    .pool-title .cn{color:var(--accent);font-weight:800;margin-right:8px}
    .pool-title .en{opacity:.8;font-weight:600}
    .pool{display:flex;gap:8px;justify-content:center}
    .score{width:110px;text-align:center;font-weight:700;font-size:16px}

    /* move side panels to corners */
    .left-panel{position:absolute;left:12px;top:120px;margin:0}
    .right-panel{position:absolute;right:12px;top:120px;margin:0}

    /* round counter in top left */
    .round-counter{position:absolute;left:12px;top:12px;display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(8,12,18,.7);border:1px solid var(--border-high);border-radius:4px;font-size:14px;font-weight:700;color:var(--accent);box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .round-counter .label{color:var(--muted);font-weight:400;font-size:12px;letter-spacing:1px}
    .round-counter .value{color:var(--gold);font-size:18px;font-weight:800;text-shadow:0 0 12px rgba(245,184,46,.4)}

    .game-row{display:flex;gap:12px;justify-content:center}
    .panel{width:320px;background:linear-gradient(180deg,var(--panel-hi) 0%,var(--panel) 60%,rgba(12,16,23,.98) 100%);border:1px solid var(--border);border-radius:4px;padding:0;color:var(--muted);box-shadow:0 2px 24px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.03);position:relative;overflow:hidden;transition:border-color .3s ease}
    .panel::before{content:'';position:absolute;top:0;left:0;width:6px;height:6px;border-top:2px solid var(--blue);border-left:2px solid var(--blue);opacity:.6;pointer-events:none;z-index:1}
    .panel::after{content:'';position:absolute;top:0;right:0;width:6px;height:6px;border-top:2px solid var(--blue);border-right:2px solid var(--blue);opacity:.3;pointer-events:none;z-index:1}
    .panel-title{font-size:14px;color:var(--muted);margin-bottom:8px}
    .panel-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .player-name{font-weight:700;color:var(--accent)}

    .status-tag{padding:4px 10px;border-radius:2px;font-weight:700;font-size:13px;letter-spacing:.5px;border:1px solid transparent}
    .status-tag.called{background:rgba(46,207,235,.1);border-color:rgba(46,207,235,.25);color:var(--cyan)}
    .status-tag.rested{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.25);color:#4ade80}
    .status-tag.ended{background:rgba(240,74,74,.1);border-color:rgba(240,74,74,.25);color:var(--red)}

    /* player info */
    .player-info{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(61,142,255,.06) 0%,transparent 100%)}
    .player-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;background:linear-gradient(180deg,var(--panel-hi),var(--panel));border:2px solid var(--border-high);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .3s ease}
    .player-avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-placeholder-small{color:var(--muted);font-size:16px;font-weight:700}
    .player-details{flex:1;min-width:0}
    .player-name-display{font-weight:800;color:var(--accent);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* roster (captured operators) */
    .roster-box{margin-top:6px;background:rgba(8,12,18,.4);border:1px solid var(--border);border-radius:4px;overflow:hidden;position:relative}
    .roster-box::before{content:'';position:absolute;bottom:0;left:0;width:6px;height:6px;border-bottom:2px solid var(--blue);border-left:2px solid var(--blue);opacity:.4;pointer-events:none;z-index:1}
    .roster-box::after{content:'';position:absolute;bottom:0;right:0;width:6px;height:6px;border-bottom:2px solid var(--blue);border-right:2px solid var(--blue);opacity:.2;pointer-events:none;z-index:1}
    .roster-title{padding:10px 10px 8px 10px;font-size:13px;color:var(--muted);letter-spacing:0.6px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(61,142,255,.04) 0%,transparent 100%)}
    .roster-title .cn{color:var(--accent);font-weight:800;margin-right:8px}
    .roster-title .en{opacity:0.85;font-weight:700}
    .roster-body{display:flex;min-height:380px}
    .roster-tabs{width:74px;border-right:1px solid var(--border);padding:8px 6px;display:flex;flex-direction:column;gap:6px;max-height:380px;overflow:auto;overscroll-behavior:contain}
    .roster-tab{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px 8px;border-radius:2px;cursor:pointer;user-select:none;color:var(--muted);font-size:13px;border-left:3px solid transparent;transition:background .2s ease,color .2s ease,border-left-color .2s ease}
    .roster-tab:hover{background:rgba(61,142,255,.06);color:var(--muted-light)}
    .roster-tab.active{background:rgba(61,142,255,.1);color:var(--accent);border-left-color:var(--blue);box-shadow:inset 0 0 0 1px rgba(61,142,255,.12)}
    .roster-tab .count{color:var(--gold);font-weight:800;font-size:14px}
    .roster-list{flex:1;min-width:0;max-height:380px;overflow:auto;overscroll-behavior:contain}
    .roster-item{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;background:transparent;transition:background .15s ease}
    .roster-item:hover{background:rgba(61,142,255,.05)}
    .roster-item.pinned::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:0 2px 2px 0;background:linear-gradient(180deg,var(--blue),rgba(61,142,255,.5))}
    .roster-avatar{width:30px;height:30px;border-radius:4px;overflow:hidden;background:var(--bg-alt);border:1px solid var(--border-high);display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;transition:border-color .2s ease}
    .roster-avatar img{width:100%;height:100%;object-fit:contain;filter:none}
    .roster-avatar svg{width:22px;height:22px}
    .roster-avatar.is-class-icon img{width:70%;height:70%;object-fit:contain;filter:brightness(0) invert(1)}
    .roster-meta{flex:1;min-width:0}
    .roster-name{font-weight:900;color:var(--accent);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.3px}
    .roster-sub{color:var(--muted);font-size:11px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .roster-stars{color:var(--gold);font-size:12px;letter-spacing:2px;min-width:60px;text-align:right;font-weight:700;text-shadow:0 0 8px rgba(251,191,36,0.4)}
    .roster-cost{min-width:28px;text-align:right;color:var(--cyan);font-weight:800;font-size:11px}
    .roster-cost .unit{font-size:11px;opacity:0.8;margin-left:2px}

    /* opponent roster: move class list to the right side */
    .right-panel .roster-body{flex-direction:row-reverse}
    .right-panel .roster-tabs{border-right:none;border-left:1px solid var(--border)}
    .stat-bars{display:flex;gap:8px;margin-bottom:8px;padding:10px 12px}
    .stat-bar{flex:1;background:linear-gradient(180deg,rgba(61,142,255,.03) 0%,rgba(0,0,0,.2) 100%);border:1px solid var(--border);border-radius:4px;padding:8px 10px;text-align:left}
    .stat-bar .label{display:block;color:var(--muted);font-size:11px;letter-spacing:0.5px;margin-bottom:4px}
    .stat-bar .value{display:block;font-weight:800;font-size:24px;color:var(--gold);text-shadow:0 0 12px rgba(245,184,46,.35)}
    .stat-bar.intel .value{color:var(--cyan);text-shadow:0 0 12px rgba(46,207,235,.35)}
    .stat-bar .value.hidden{color:rgba(200,210,230,.3);text-shadow:none}
    .stat-bar::after{content:'';display:block;height:2px;border-radius:1px;margin-top:4px;background:linear-gradient(90deg,var(--gold-dim),rgba(245,184,46,.2));width:100%}
    .stat-bar.intel::after{background:linear-gradient(90deg,var(--cyan-dim),rgba(46,207,235,.2))}

    .battle-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:12px;padding-top:160px}
    .center-timer{color:var(--muted-light);font-size:14px;font-weight:600;letter-spacing:1px}
    .round-banner{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 10px;border-radius:4px;
      border:1px solid var(--border-high);
      background:rgba(8,12,18,.5);
      color:var(--accent);
      font-size:12px;
      letter-spacing:0.6px;
      user-select:none;
    }
    .round-banner.end{border-color:rgba(240,74,74,.6);box-shadow:0 0 0 1px rgba(240,74,74,.12) inset;background:rgba(20,8,8,.5)}
    .round-banner .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,80,80,0.9);box-shadow:0 0 10px rgba(255,80,80,0.35)}
    .operator-card{width:240px;min-height:200px;background:linear-gradient(175deg,rgba(20,25,33,.95) 0%,rgba(12,16,23,.98) 50%,rgba(8,12,18,.98) 100%);border:1px solid var(--border-high);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px 12px;gap:6px;box-shadow:0 4px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);position:relative;transition:border-color .3s ease,box-shadow .3s ease}
    .operator-card::before{content:'';position:absolute;top:-1px;left:-1px;width:10px;height:10px;border-top:2px solid var(--blue);border-left:2px solid var(--blue);opacity:.5;pointer-events:none}
    .operator-card::after{content:'';position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-bottom:2px solid var(--blue);border-right:2px solid var(--blue);opacity:.35;pointer-events:none}
    .operator-card.is-ended{justify-content:center}
    .operator-icon{width:56px;height:56px;color:#fff;opacity:.95;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 12px rgba(61,142,255,.3))}
    .operator-icon:empty{display:none}
    .operator-icon svg{width:100%;height:100%}
    .operator-icon img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
    #operator-name{font-size:26px;font-weight:700;margin-top:2px;letter-spacing:1px;text-shadow:0 0 20px rgba(61,142,255,.15)}
    .operator-card.is-ended #operator-name{margin-top:0}
    #operator-stars{color:var(--gold);margin-top:6px;font-size:16px;text-shadow:0 0 12px rgba(245,184,46,.3)}
    #operator-branch{color:var(--muted);font-size:14px;margin-top:0}
    #btn-call,#btn-peek,#btn-rest,#btn-end,#btn-continue,#claim{padding:8px 20px;font-size:14px;font-weight:600;letter-spacing:.5px;background:linear-gradient(180deg,rgba(61,142,255,.12) 0%,rgba(61,142,255,.04) 100%);border:1px solid var(--border-high);color:var(--accent);border-radius:2px;cursor:pointer;transition:background .2s ease,border-color .2s ease,box-shadow .2s ease,color .2s ease;position:relative}
    #btn-call:hover:not(:disabled),#btn-peek:hover:not(:disabled),#btn-rest:hover:not(:disabled),#btn-end:hover:not(:disabled),#btn-continue:hover:not(:disabled),#claim:hover:not(:disabled){background:linear-gradient(180deg,rgba(61,142,255,.2) 0%,rgba(61,142,255,.08) 100%);border-color:rgba(120,160,220,.35);box-shadow:0 0 12px rgba(61,142,255,.15);color:#fff}
    #btn-call:active:not(:disabled),#btn-peek:active:not(:disabled),#btn-rest:active:not(:disabled),#btn-end:active:not(:disabled),#btn-continue:active:not(:disabled),#claim:active:not(:disabled){background:rgba(61,142,255,.08);box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
    #btn-call:disabled,#btn-peek:disabled,#btn-rest:disabled,#btn-end:disabled,#btn-continue:disabled,#claim:disabled{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.05);color:rgba(255,255,255,.25);cursor:not-allowed}
    #btn-end{background:linear-gradient(180deg,rgba(240,74,74,.1) 0%,rgba(240,74,74,.03) 100%);border-color:rgba(240,74,74,.3)}
    #btn-end:hover:not(:disabled){background:linear-gradient(180deg,rgba(240,74,74,.18) 0%,rgba(240,74,74,.06) 100%);border-color:rgba(240,74,74,.5);box-shadow:0 0 12px rgba(240,74,74,.15)}
    #btn-call-decr,#btn-call-incr{padding:4px 10px;font-size:14px;font-weight:700;background:rgba(61,142,255,.08);border:1px solid var(--border-high);color:var(--accent);border-radius:2px;cursor:pointer;transition:background .2s ease;min-width:28px}
    #btn-call-decr:hover:not(:disabled),#btn-call-incr:hover:not(:disabled){background:rgba(61,142,255,.18)}
    #call-amount{width:48px;text-align:center;background:var(--bg-alt);border:1px solid var(--border-high);border-radius:2px;color:var(--accent);font-size:15px;font-weight:700;padding:4px 0;outline:none;transition:border-color .2s ease}
    #call-amount:focus{border-color:var(--blue)}

    /* small card in pool */
    .small-card{width:86px;height:110px;border-radius:4px;background:linear-gradient(175deg,rgba(20,25,33,.95),rgba(12,16,23,.97));border:1px solid var(--border-high);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;color:var(--muted);font-size:14px;gap:2px;padding:8px 7px 6px;box-shadow:0 2px 16px rgba(0,0,0,.4);transition:border-color .2s ease,transform .2s ease;position:relative}
    .small-card:hover{border-color:var(--border-focus);transform:translateY(-2px)}
    .small-card::after{content:'';position:absolute;top:4px;right:4px;width:4px;height:4px;background:var(--blue);transform:rotate(45deg);opacity:.5;pointer-events:none}
    .small-card .class-icon{width:42px;height:42px;border-radius:6px;background:var(--bg-alt);border:1px solid var(--border-high);color:#fff;opacity:.95;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .small-card .class-icon svg{width:100%;height:100%}
    .small-card .class-icon img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
    .small-card .name{margin-top:5px;font-weight:800;color:var(--accent);font-size:13px;line-height:1.1;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .small-card .stars{color:var(--gold);font-size:11px;letter-spacing:1px;line-height:1.1;margin-top:2px;min-height:12px}
    .small-card .sub{font-size:10px;color:var(--muted);line-height:1.1;margin-top:2px;min-height:11px}

    @media(max-width:900px){
      .panel{display:none}
      .operator-card{width:200px;min-height:160px}
      .operator-icon{width:46px;height:46px}
      #operator-name{font-size:22px}
    }
      .ended-badge{display:inline-block;margin-left:8px;background:var(--red);color:#fff;padding:2px 6px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.5px}
    /* collision overlay */
    .collision-overlay{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%);pointer-events:none;z-index:60}
    .collision-bubble{display:flex;gap:20px;align-items:center}
    .collide-num{width:90px;height:90px;border-radius:50%;background:linear-gradient(180deg,#f0f0f0,#d0d0d0);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#111;box-shadow:0 6px 18px rgba(0,0,0,.6);transform:scale(0);transition:transform 300ms cubic-bezier(.2,.9,.2,1),opacity 300ms;opacity:0}
    .collide-num.show{transform:scale(1);opacity:1}
    .collide-num.hit{background:linear-gradient(180deg,#ff7b7b,var(--red));color:#fff}
    .collide-num.winner{background:linear-gradient(180deg,#5eaeff,var(--blue));color:#fff}

    /* banned protocol (bottom bar + click-to-expand overlay) */
    .banned-bar{
      position:fixed;
      left:50%;
      bottom:10px;
      transform:translateX(-50%);
      width:min(1200px, 96vw);
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(240,74,74,.65);
      border-radius:2px;
      box-shadow:0 0 0 1px rgba(0,0,0,.35) inset, 0 8px 24px rgba(0,0,0,.45);
      background:
        repeating-linear-gradient(135deg, rgba(240,74,74,.06) 0px, rgba(240,74,74,.06) 10px, rgba(240,74,74,.02) 10px, rgba(240,74,74,.02) 20px),
        linear-gradient(180deg, rgba(20,8,8,.92), rgba(12,6,6,.92));
      z-index:70;
      transition:border-color .2s ease,box-shadow .2s ease;
    }
    .banned-bar:hover{border-color:rgba(240,74,74,.9);box-shadow:0 0 0 1px rgba(0,0,0,.35) inset, 0 8px 24px rgba(0,0,0,.45), 0 0 16px rgba(240,74,74,.15)}
    .banned-icon{width:14px;height:14px;display:inline-block;position:relative;transform:translateY(-1px)}
    .banned-icon::before{
      content:'';
      position:absolute;
      left:0;top:1px;
      width:0;height:0;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-bottom:12px solid rgba(255, 80, 80, 0.95);
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
    }
    .banned-icon::after{
      content:'!';
      position:absolute;
      left:5px;top:2px;
      font-size:10px;
      font-weight:900;
      color:#240000;
    }
    .banned-text{color:rgba(240,74,74,.95);font-weight:700;letter-spacing:1.5px;font-size:12px;text-transform:uppercase;white-space:nowrap;text-shadow:0 0 8px rgba(240,74,74,.3)}

    .banned-overlay{
      position:fixed;
      left:50%;
      bottom:54px;
      transform:translateX(-50%);
      width:min(1000px, 94vw);
      max-height:min(46vh, 340px);
      overflow:hidden;
      border:1px solid var(--border-high);
      border-radius:4px;
      background:rgba(8,12,18,.88);
      box-shadow:0 14px 40px rgba(0,0,0,.6);
      z-index:70;
      padding:10px;
    }
    /* keep all 8 classes visible in one row (no wrap -> no clipping) */
    .banned-grid{display:flex;gap:8px;align-items:stretch;overflow:hidden;padding-bottom:6px}
    .banned-card{flex:1 1 0;min-width:0;border:1px solid var(--border);background:rgba(8,12,18,.3);border-radius:4px;overflow:hidden;transition:border-color .2s ease}
    .banned-card .head{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
    .banned-card .head .cls{font-weight:900;color:var(--accent);font-size:13px}
    .banned-card .head .cnt{font-weight:900;color:rgba(255,80,80,0.95)}
    .banned-branches{padding:6px 8px;display:flex;flex-direction:column;gap:5px}
    .banned-branch{display:flex;align-items:center;justify-content:space-between;color:var(--accent);font-size:12px;gap:6px;padding:2px 0;transition:color .15s ease}
    .banned-branch:hover{color:var(--blue)}
    .banned-branch.zero{color:var(--red-dim)}
    .banned-branch .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 26px)}
    .banned-branch .count{font-weight:800;flex:0 0 auto}

    .banned-detail{
      position:fixed;
      left:50%;
      bottom:calc(54px + 210px);
      transform:translateX(-50%);
      width:fit-content;
      max-width:94vw;
      --banned-detail-cols-max:10;
      border:1px solid var(--border-high);
      background:rgba(8,12,18,.9);
      box-shadow:0 16px 50px rgba(0,0,0,.6);
      z-index:71;
      border-radius:4px;
      overflow:hidden;
    }
    .banned-detail .head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:move;background:linear-gradient(180deg,rgba(61,142,255,.06),transparent)}
    .banned-detail.dragging{opacity:0.96}
    .banned-detail.dragging .head{cursor:grabbing}
    .banned-detail .title{font-weight:900;color:var(--accent);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .banned-detail .sub{color:var(--muted);font-size:12px;white-space:nowrap}
    .banned-detail .close{cursor:pointer;color:rgba(255,80,80,0.95);font-weight:900;user-select:none}
    .banned-detail .list{display:inline-grid;grid-template-columns:repeat(var(--banned-detail-cols, var(--banned-detail-cols-max)), 44px);gap:8px;padding:10px;overflow:hidden}
    .banned-op{width:44px;flex:0 0 auto}
    .banned-op .av{width:44px;height:44px;border-radius:4px;overflow:hidden;background:var(--bg-alt);border:1px solid var(--border-high);display:flex;align-items:center;justify-content:center;position:relative;transition:border-color .2s ease}
    .banned-op .av img{width:100%;height:100%;object-fit:contain;filter:none}
    .banned-op .av svg{width:22px;height:22px}
    .banned-op.banned .av{border-color:rgba(240,74,74,.8);box-shadow:0 0 0 1px rgba(240,74,74,.3) inset}
    .banned-op.banned .av::after{content:'';position:absolute;inset:0;background:rgba(255,80,80,0.40);pointer-events:none}
    .banned-op.banned .av img{filter:saturate(0.65) contrast(1.05)}

    @media(max-width:900px){
      .banned-detail{max-width:96vw;--banned-detail-cols-max:8}
    }
    @media(max-width:640px){
      .banned-overlay{width:min(94vw, 680px)}
      .banned-detail{max-width:94vw;--banned-detail-cols-max:6}
    }
  </style>
</head>
<body>

  <section id="lobby">
    <div class="lobby-container">
      <div class="avatar-section">
        <div class="avatar-preview" id="avatar-preview">
          <div class="avatar-placeholder">头像</div>
        </div>
        <div class="avatar-actions">
          <button id="btn-upload-avatar">上传头像</button>
          <button id="btn-random-avatar">随机头像</button>
          <input type="file" id="avatar-upload" accept="image/*" style="display:none" />
        </div>
      </div>
      <div class="lobby-form">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
          <label>昵称：<input id="name" placeholder="输入你的昵称" /></label>
          <label>对局：
            <select id="match-select"></select>
          </label>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:8px">
          <button id="create-match">新建对局</button>
          <button id="join-player">加入(玩家)</button>
          <button id="join-spectator">观战</button>
        </div>
      </div>
      <div id="players"></div>
      <div class="status" id="status">未加入</div>
    </div>
  </section>

  <section id="game" style="display:none;">
    <div class="round-counter">
      <span class="label">回合</span>
      <span class="value" id="round-display">1</span>
    </div>

    <div class="top-row">
      <div class="pool-wrap">
        <div class="pool-title"><span class="cn">公共干员</span><span class="en">/ PUBLIC POOL</span></div>
        <div class="pool" id="public-pool">
          <!-- small operator cards -->
        </div>
      </div>
    </div>

    <div class="game-row">
      <aside class="panel left-panel">
        <div class="player-info">
          <div class="player-avatar" id="left-player-avatar">
            <div class="avatar-placeholder-small">?</div>
          </div>
          <div class="player-details">
            <div class="player-name-display" id="left-player-name">等待玩家</div>
          </div>
        </div>
        <div class="stat-bars">
          <div class="stat-bar"><span class="label">调用点</span><span id="left-callpoints" class="value">0</span></div>
          <div class="stat-bar intel"><span class="label">情报点</span><span id="left-intelpoints" class="value">0</span></div>
        </div>
        <div class="roster-box">
          <div class="roster-title"><span class="cn">干员列表</span><span class="en">// ROSTER</span></div>
          <div class="roster-body">
            <div class="roster-tabs" id="left-roster-tabs"></div>
            <div class="roster-list" id="left-operators"></div>
          </div>
        </div>
      </aside>

      <main class="battle-area">
        <div class="center-timer" id="timer">--</div>
        <div class="round-banner" id="round-banner" style="display:none"><span class="dot"></span><span id="round-banner-text">-</span></div>
        <div class="operator-card" id="operator">
          <div class="operator-icon" id="operator-icon" aria-hidden="true"></div>
          <div id="operator-name">等待开始...</div>
          <div id="operator-stars"></div>
          <div id="operator-branch"></div>
        </div>
        <div id="action-row" style="display:flex;gap:8px;align-items:center;margin-top:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <button id="btn-call-decr">-</button>
            <input id="call-amount" value="1" style="width:48px;text-align:center" />
            <button id="btn-call-incr">+</button>
          </div>
          <button id="btn-call" disabled>调用</button>
          <button id="btn-peek" disabled>查看 (消耗1)</button>
          <button id="btn-rest">休息</button>
          <button id="btn-end">结束</button>
        </div>
        <div id="action-status" style="display:flex;justify-content:center;gap:8px;margin-top:8px"></div>
        <div id="continue-row" style="display:none;gap:8px;align-items:center;margin-top:8px">
          <button id="btn-continue">继续</button>
        </div>

        <div id="easter-info" style="color:var(--muted);font-size:12px;min-height:16px"></div>
      </main>

      <aside class="panel right-panel">
        <div class="player-info">
          <div class="player-avatar" id="right-player-avatar">
            <div class="avatar-placeholder-small">?</div>
          </div>
          <div class="player-details">
            <div class="player-name-display" id="right-player-name">等待玩家</div>
          </div>
        </div>
        <div class="stat-bars">
          <div class="stat-bar"><span class="label">调用点</span><span id="right-callpoints" class="value">0</span></div>
          <div class="stat-bar intel"><span class="label">情报点</span><span id="right-intelpoints" class="value">0</span></div>
        </div>
        <div class="roster-box">
          <div class="roster-title"><span class="cn">干员列表</span><span class="en">// ROSTER</span></div>
          <div class="roster-body">
            <div class="roster-tabs" id="right-roster-tabs"></div>
            <div class="roster-list" id="right-operators"></div>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <div id="collision-overlay" class="collision-overlay" aria-hidden="true"></div>

  <div id="banned-overlay" class="banned-overlay" aria-hidden="true" style="display:none">
    <!-- keep old selectors (hidden) for compatibility / debugging -->
    <div style="display:none">
      <select id="removed-mode" style="margin-right:8px">
        <option value="removed">已移出</option>
        <option value="remaining" selected>未移出</option>
      </select>
      <select id="removed-filter" style="margin-right:8px">
        <option value="">全部职业</option>
        <option value="先锋">先锋</option>
        <option value="近卫">近卫</option>
        <option value="重装">重装</option>
        <option value="狙击">狙击</option>
        <option value="术师">术师</option>
        <option value="医疗">医疗</option>
        <option value="辅助">辅助</option>
        <option value="特种">特种</option>
      </select>
    </div>
    <div id="banned-grid" class="banned-grid"></div>
  </div>
  <div id="banned-detail" class="banned-detail" aria-hidden="true" style="display:none">
    <div class="head">
      <div id="banned-detail-title" class="title">-</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="banned-detail-sub" class="sub"></div>
        <div id="banned-detail-close" class="close" role="button" tabindex="0">×</div>
      </div>
    </div>
    <div id="banned-detail-list" class="list"></div>
  </div>
  <div id="banned-bar" class="banned-bar" role="button" tabindex="0" aria-expanded="false">
    <span class="banned-icon" aria-hidden="true"></span>
    <span id="banned-bar-text" class="banned-text">禁用协议 / BANNED PROTOCOL [0 OPERATORS DETECTED]</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/all.js?v=20260114"></script>
</body>
</html>
